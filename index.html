<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Web Development Bootcamp</h1>
    <section class="gallery">
            <img src="html.png" alt="HTML" width="200" height="200">

        <ol>
          <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>
    </section>
    <h2>User Form</h2>
    <h3>HTML Portion</h3>
    <p>Lorem ipsum dolor sit amet. <b>Bold Text</b><br><i>Italic Text</i></p>
    <form id="userForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required>
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <label for="select">Select Choice</label>
        <select name="role" id="select">
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
            <option value="4">Option 4</option>
        </select>
        <br>
        <label for="age">Age:</label>
        <input type="number" id="age" required>
        <br>
        <button type="submit">Submit</button>
    </form>
    <br>
    <a href="https://www.google.com">This is a link</a>
    <br>
    <img src="css.png" alt="Error" height="250" width="200">
    <br>
    <div id="output"></div>
    <h3>Ordered List</h3>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <h3>Unordered List</h3>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <section class="calculator">
        <h3>Sum Calculator</h3>
        <input type="number" id="a" placeholder="Enter A">
        <input type="number" id="b" placeholder="Enter B">
        <button id="calcBtn">Calculate Sum</button>
        <div id="sumOutput"></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
